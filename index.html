<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web en la Nube</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #contenedor{
            width: 90%;
            margin: auto;
            background: rgba(255,255,255,0.9);
            min-height: 100vh;
        }

        header{
            background-color: #1e3a5f;
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
        }

        header img{
            width: 80px;
            margin-right: 20px;
        }

        header h1{
            font-size: 30px;
        }

        main{
            padding: 40px;
            text-align: center;
        }

        main a{
            text-decoration: none;
            background-color: #1e3a5f;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
        }

        main a:hover{
            background-color: #294d7a;
        }

        footer{
            background-color: #1e3a5f;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

    </style>
</head>

<body>

    <div id="contenedor">

        <header>
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968267.png" alt="Logo">
            <h1>Mi Aplicación Web en Railway</h1>
        </header>

        <main>

            <h2>Bienvenido a mi sitio web</h2>

            <br><br>

            <p>

            </p>

            <br><br>

            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
                Ver Video
            </a>

        </main>

        <footer>

            <p><strong>Curso:</strong> Conceptualización de servicios en la nube</p>

            <p><strong>Código:</strong> 224791076</p>

</html>
